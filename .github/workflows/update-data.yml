name: Update data daily

on:
  schedule:
    - cron: "0 6,12,18 * * *"   # 3x por dia: 6h, 12h, 18h UTC
  workflow_dispatch:              # permite correr manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_REGIONS: ${{ secrets.ODDS_API_REGIONS || 'eu,uk' }}
          ODDS_API_MARKETS: ${{ secrets.ODDS_API_MARKETS || 'h2h,totals' }}
          ODDS_API_BOOKMAKERS: ${{ secrets.ODDS_API_BOOKMAKERS || 'betclic_fr,betfair_sb_uk,betvictor,betway,ladbrokes_uk,leovegas,pinnacle,williamhill,sport888' }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: npm run update-data

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.js
          git diff --staged --quiet || git commit -m "Auto-update data $(date -u +%Y-%m-%d_%H:%M)"
          git push
